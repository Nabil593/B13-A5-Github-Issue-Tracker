<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind & Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Intregration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- FontAwsome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS Style -->
    <link rel="stylesheet" href="style.css">
    <title>Github Isshue Tracker</title>
</head>

<body>
    <section class="hero-content mt-2 mx-auto flex-col lg:flex-row-reverse">
        <div class="card bg-base-100 w-full max-w-[500px] shrink-0 shadow-2xl">

            <div class="text-center py-5 ">
                <img src="./assets/github-logo.png" alt="github" class="mx-auto">
                <h2 class="text-2xl font-semibold mt-4">GitHub Issues Tracker</h2>
                <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
            </div>

            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label">Username</label>
                    <input type="text" class="input w-full" placeholder="Enter Username" />
                    <div><a class="link link-hover">Default: admin</a></div>
                    <label class="label">Password</label>
                    <input type="password" class="input w-full" placeholder="Enter Password" />
                    <div><a class="link link-hover">Default: admin123</a></div>
                    <button class="btn btn-neutral mt-4">Sign In</button>
                </fieldset>

                <div class="grid grid-cols-3 items-center justify-between mt-2">
                    <hr class="text-[#d8d8d8]">
                    <p class="text-center text-[16px] text-[#1F2937]">OR</p>
                    <hr class="text-[#d8d8d8]">
                </div>

                <p class="text-center mt-2 text-[12px] text-[#64748B]">Demo Credentials:</p>

                <div class="text-center bg-[#dadada] py-6">
                    <p><span class="font-bold">Username:</span> admin</p>
                    <p><span class="font-bold">Password:</span> admin123</p>
                </div>

            </div>
        </div>
    </section>
</body>

</html>
