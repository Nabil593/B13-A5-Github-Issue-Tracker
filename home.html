<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind & Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Intregration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- FontAwsome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- CSS Style -->
    <link rel="stylesheet" href="style.css">
    <title>Github Isshue Tracker</title>
</head>

<body>
    <header class="bg-white flex items-center justify-between lg:px-20 md:px-14 sm:px-10 px-4 py-4 border-1 border-gray-200">
        <div class="flex items-center gap-1">
            <img src="./assets/github-logo.png" alt="github" class="max-w-8">
            <h1 class="font-semibold lg:text-2xl md:text-[20px] lg:block md:block sm:hidden hidden ">GitHub Issues
                Tracker</h1>
        </div>

        <div class="flex items-center lg:gap-4 md:gap-2 sm:gap-1 gap-1 ml-10">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues.." />
            </label>

            <button class="btn bg-[#4A00FF] text-white">+ New Issue</button>
        </div>
    </header>


    <section>
        <div class="max-w-[1110px] mx-auto bg-white p-6 mt-[60px] rounded-lg shadow-sm space-x-2">
            <button class="py-2 px-[50px] border-1 border-gray-200 rounded-[4px] cursor-pointer btn">All</button>
            <button class="py-2 px-[50px] border-1 border-gray-200 rounded-[4px] cursor-pointer btn">Open</button>
            <button class="py-2 px-[50px] border-1 border-gray-200 rounded-[4px] cursor-pointer btn">Closed</button>
        </div>
    </section>

    <section>
        <div class="max-w-[1110px] mx-auto bg-white p-4 mt-4 rounded-t-lg flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-12 h-12 rounded-full bg-[#ECE4FF] flex items-center justify-center"><img
                        src="./assets/Aperture.png" alt="Aperture"></div>
                <div>
                    <p class="text-[20px] font-semibold"><Span>50</Span> Issues</p>
                    <p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <p class="flex items-center gap-2"><img src="./assets/Ellipse 2.png" alt=""> Open</p>
                <p class="flex items-center gap-2"><img src="./assets/Ellipse 2 (1).png" alt=""> Closed</p>
            </div>
        </div>

        <hr class="max-w-[1110px] mx-auto text-gray-300 rounded-lg">

        <section class="max-w-[1110px] mx-auto bg-[#FBFBFB] p-6 rounded-b-lg grid  grid-cols-4 gap-3 shadow-lg">

            <div class="card w-[256px] bg-base-100 shadow-sm border-t-4 border-green-600">
                <div class="p-4 space-y-2">
                    <div class="flex items-center justify-between">
                        <img src="./assets/Open-Status.png" alt="Open">
                        <p class="py-1 px-[25px] text-[12px] font-medium bg-[#FEECEC] text-[#EF4444] rounded-full">HIGH
                        </p>
                    </div>
                    <h2 class="text-[14px] font-semibold">Fix navigation menu on mobile devices</h2>
                    <p class="text-[12px] text-[#64748B]">The navigation menu doesn't collapse properly on mobile
                        devices...</p>
                    <div class="flex items-center justify-between">
                        <p
                            class="flex items-center gap-1 py-[6px] px-2 text-[12px] font-medium border-1 border-[#FECACA] bg-[#FEECEC] text-[#EF4444] rounded-full">
                            <img src="./assets/BugDroid.png" alt=""> BUG
                        </p>
                        <p
                            class="flex items-center gap-1 py-[6px] px-2 text-[12px] font-medium border-1 border-[#FDE68A] bg-[#FFF8DB] text-[#D97706] rounded-full">
                            <img src="./assets/Lifebuoy.png" alt=""> HELP WANTED
                        </p>
                    </div>
                </div>

                <div class="py-3 space-y-1 border-t-2 border-gray-300 p-4">
                    <p class="text-[12px] text-[#64748B]">#1 by john_doe</p>
                    <p class="text-[12px] text-[#64748B]">1/15/2024</p>
                </div>
            </div>

        </section>
    </section>
</body>

</html>
